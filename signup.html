<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <link href="./output.css" rel="stylesheet" />
  </head>
  <body
    class="bg-cover bg-center min-h-screen flex items-center justify-center relative"
    style="background-image: url(&quot;bg.jpg&quot;)"
  >
    <div class="absolute inset-0 bg-black/40 backdrop-blur-[2px]"></div>

    <section
      class="relative z-10 w-full max-w-md p-8 bg-white rounded-2xl shadow-xl"
    >
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-900 mb-2">Create Account</h1>
        <p class="text-gray-500 text-sm">Join us and start your journey</p>
      </div>

      <form class="space-y-5">
        <div class="space-y-1">
          <label class="block text-sm font-medium text-gray-700" for="username"
            >Username</label
          >
          <input
            id="username"
            type="text"
            placeholder="Choose a username"
            required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          />
        </div>

        <div class="space-y-1">
          <label class="block text-sm font-medium text-gray-700" for="email"
            >Email Address</label
          >
          <input
            id="email"
            type="email"
            placeholder="Enter your email"
            required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          />
        </div>

        <div class="space-y-1">
          <label class="block text-sm font-medium text-gray-700" for="password"
            >Password</label
          >
          <input
            id="password"
            type="password"
            placeholder="••••••••"
            required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          />
        </div>

        <div class="space-y-1">
          <label
            class="block text-sm font-medium text-gray-700"
            for="confirm-password"
            >Confirm Password</label
          >
          <input
            id="confirm-password"
            type="password"
            placeholder="••••••••"
            required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          />
        </div>

        <div class="flex items-center text-sm">
          <label
            class="flex items-center text-gray-600 cursor-pointer hover:text-gray-900"
          >
            <input
              type="checkbox"
              required
              class="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500 mr-2"
            />
            I agree to the
            <a
              href="#"
              class="text-blue-600 hover:text-blue-500 font-medium ml-1"
              >Terms</a
            >
            <span class="mx-1">and</span>
            <a href="#" class="text-blue-600 hover:text-blue-500 font-medium"
              >Privacy Policy</a
            >
          </label>
        </div>

        <button
          type="submit"
          class="w-full py-2.5 px-4 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg shadow-sm transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500"
        >
          Sign Up
        </button>
      </form>

      <p class="mt-6 text-center text-sm text-gray-600">
        Already have an account?
        <a
          href="login.html"
          class="text-blue-600 hover:text-blue-500 font-medium"
          >Sign in here</a
        >
      </p>
    </section>
  </body>
</html>
